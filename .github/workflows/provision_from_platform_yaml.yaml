# Reusable workflow: provision a service from platform.yaml (ECR, ECS, ALB listener rule, Cloudflare DNS).
# Called by service repos on push to main (deploy) or on PR (preview).
name: Provision from platform.yaml

on:
  workflow_call:
    inputs:
      service_repo:
        description: "Repo containing platform.yaml (e.g. althq-org/my-ecs-service)"
        required: true
        type: string
      ref:
        description: "Ref to checkout (branch or SHA)"
        required: false
        default: main
        type: string
      platform_yaml_path:
        description: "Path to platform.yaml relative to repo root"
        required: false
        default: platform.yaml
        type: string
      stack:
        description: "Environment stack (e.g. dev)"
        required: false
        default: dev
        type: string
      aws_region:
        description: "AWS region"
        required: true
        type: string
      aws_acct_id:
        description: "AWS account ID"
        required: true
        type: string
      preview_only:
        description: "If true, run pulumi preview instead of pulumi up (no deploy)"
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

jobs:
  provision:
    name: Provision and Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout platform-engine-temp
        uses: actions/checkout@v4
        with:
          repository: althq-org/platform-engine-temp
          ref: main
          path: engine
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout service repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.service_repo }}
          ref: ${{ inputs.ref }}
          path: service
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: |
          python3 -m pip install PyYAML
          python3 -c "import yaml; print('PyYAML OK')"

      - name: Read platform.yaml metadata
        id: service_name
        run: |
          python3 -c "
          import yaml, json
          config = yaml.safe_load(open('service/${{ inputs.platform_yaml_path }}'))
          print('service_name=' + config['metadata']['name'])
          runtimes = config.get('spec', {}).get('agentcoreRuntime', {}).get('runtimes', [])
          print('has_agentcore=' + ('true' if runtimes else 'false'))
          print('agentcore_runtimes=' + json.dumps([{'name': rt['name'], 'image': rt['image'], 'arch': rt.get('architecture', 'arm64')} for rt in runtimes]))
          " >> $GITHUB_OUTPUT

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: arn:aws:iam::${{ inputs.aws_acct_id }}:role/platform_engine_temp_workflows

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Pulumi and dependencies
        working-directory: engine
        run: |
          uv sync
          curl -fsSL https://get.pulumi.com | sh
          echo "$HOME/.pulumi/bin" >> $GITHUB_PATH

      - name: Select or create Pulumi stack
        working-directory: engine
        env:
          PLATFORM_YAML_PATH: ${{ github.workspace }}/service/${{ inputs.platform_yaml_path }}
          PULUMI_BACKEND_URL: s3://${{ inputs.aws_acct_id }}-pulumi-backend-software
        run: |
          STACK_NAME="${{ inputs.stack }}.${{ steps.service_name.outputs.service_name }}.${{ inputs.aws_region }}"
          export PATH="$HOME/.local/bin:$HOME/.pulumi/bin:$PATH"
          KMS_PROVIDER="awskms://alias/pulumi_backend_software?region=${{ inputs.aws_region }}"

          echo "Attempting to select stack: $STACK_NAME"
          if uv run pulumi stack select "$STACK_NAME" -C devops 2>&1; then
            echo "✓ Selected existing stack"
          else
            echo "Stack does not exist, creating with KMS secrets provider"
            echo "KMS alias: $KMS_PROVIDER"
            uv run pulumi stack init "$STACK_NAME" \
              --secrets-provider="$KMS_PROVIDER" \
              -C devops
            echo "✓ Stack created"
          fi

          # CRITICAL: Ensure local Pulumi.<stack>.yaml has KMS metadata
          # Without this, Pulumi falls back to expecting PULUMI_CONFIG_PASSPHRASE
          echo "Ensuring local stack YAML has KMS secrets provider metadata..."
          STACK_YAML="devops/Pulumi.$STACK_NAME.yaml"

          # Export stack to temporary file
          STACK_EXPORT_FILE=$(mktemp)
          uv run pulumi stack export -C devops > "$STACK_EXPORT_FILE" 2>&1

          # Use Python script to update YAML with KMS metadata
          # Note: We're already in the 'engine' working directory
          python3 scripts/ensure_kms_metadata.py "$STACK_EXPORT_FILE" "$STACK_YAML"

          # Cleanup
          rm -f "$STACK_EXPORT_FILE"

          echo "Stack info:"
          uv run pulumi stack -C devops 2>&1 || true

      - name: Set Pulumi config
        working-directory: engine
        env:
          PULUMI_BACKEND_URL: s3://${{ inputs.aws_acct_id }}-pulumi-backend-software
        run: |
          STACK_NAME="${{ inputs.stack }}.${{ steps.service_name.outputs.service_name }}.${{ inputs.aws_region }}"
          export PATH="$HOME/.local/bin:$HOME/.pulumi/bin:$PATH"
          uv run pulumi stack select "$STACK_NAME" -C devops
          uv run pulumi config set aws:region ${{ inputs.aws_region }} -C devops

      - name: Export secrets from platform.yaml
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}
        run: |
          # Detect secrets format: legacy (list) needs GitHub secrets, KMS (dict) is self-contained
          SECRETS_FORMAT=$(python3 -c "
          import yaml
          config = yaml.safe_load(open('service/${{ inputs.platform_yaml_path }}'))
          secrets = config.get('spec', {}).get('secrets')
          if secrets is None:
              print('none')
          elif isinstance(secrets, list):
              print('legacy')
          elif isinstance(secrets, dict):
              print('kms')
          else:
              print('none')
          ")

          if [ "$SECRETS_FORMAT" = "none" ]; then
            echo "No secrets declared in platform.yaml"
            exit 0
          fi

          if [ "$SECRETS_FORMAT" = "kms" ]; then
            echo "✓ Secrets are KMS-encrypted in platform.yaml — decrypted at deploy time"
            exit 0
          fi

          # Legacy format: export each required secret from GitHub secrets
          REQUIRED_SECRETS=$(python3 -c "
          import yaml
          config = yaml.safe_load(open('service/${{ inputs.platform_yaml_path }}'))
          secrets = config.get('spec', {}).get('secrets', [])
          print(' '.join(secrets))
          ")

          for SECRET_NAME in $REQUIRED_SECRETS; do
            SECRET_VALUE=$(echo "$ALL_SECRETS" | jq -r ".[\"$SECRET_NAME\"] // empty")
            if [ -n "$SECRET_VALUE" ]; then
              echo "::add-mask::$SECRET_VALUE"
              echo "$SECRET_NAME=$SECRET_VALUE" >> $GITHUB_ENV
              echo "✓ Found secret: $SECRET_NAME"
            else
              echo "⚠ Missing secret: $SECRET_NAME (not set in GitHub secrets)"
            fi
          done

      # -----------------------------------------------------------------------
      # AgentCore: build and push images BEFORE Pulumi runs.
      #
      # Why this order matters: Pulumi calls update_agent_runtime with the new
      # image URI. AWS validates that the ECR image exists at call time. Running
      # Pulumi first (old order) caused ValidationException because the image
      # hadn't been pushed yet. Building first eliminates that error path and
      # removes the need for exception-swallowing or a second Pulumi pass.
      #
      # ECR repo names are deterministic ({service}-{image}), so we can
      # create them and push before Pulumi without needing Pulumi outputs.
      # -----------------------------------------------------------------------

      - name: Set up QEMU for multi-arch builds
        if: ${{ !inputs.preview_only && steps.service_name.outputs.has_agentcore == 'true' }}
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: ${{ !inputs.preview_only && steps.service_name.outputs.has_agentcore == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Pre-create AgentCore ECR repos
        if: ${{ !inputs.preview_only && steps.service_name.outputs.has_agentcore == 'true' }}
        run: |
          # ECR repo names are deterministic: {service_name}-{image_name}.
          # Create them idempotently so we can push before Pulumi runs.
          for row in $(echo '${{ steps.service_name.outputs.agentcore_runtimes }}' | jq -c '.[]'); do
            IMAGE_NAME=$(echo "$row" | jq -r '.image')
            REPO_NAME="${{ steps.service_name.outputs.service_name }}-${IMAGE_NAME}"
            echo "Ensuring ECR repo: $REPO_NAME"
            aws ecr describe-repositories --repository-names "$REPO_NAME" --region ${{ inputs.aws_region }} > /dev/null 2>&1 \
              || aws ecr create-repository --repository-name "$REPO_NAME" --region ${{ inputs.aws_region }} > /dev/null
            echo "✓ $REPO_NAME ready"
          done

      - name: Login to Amazon ECR (AgentCore pre-build)
        if: ${{ !inputs.preview_only && steps.service_name.outputs.has_agentcore == 'true' }}
        run: |
          aws ecr get-login-password --region ${{ inputs.aws_region }} | \
            docker login --username AWS --password-stdin \
            ${{ inputs.aws_acct_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com

      - name: Build and push AgentCore images
        if: ${{ !inputs.preview_only && steps.service_name.outputs.has_agentcore == 'true' }}
        run: |
          for row in $(echo '${{ steps.service_name.outputs.agentcore_runtimes }}' | jq -c '.[]'); do
            IMAGE_NAME=$(echo "$row" | jq -r '.image')
            ARCH=$(echo "$row" | jq -r '.arch')
            REPO_NAME="${{ steps.service_name.outputs.service_name }}-${IMAGE_NAME}"
            ECR_URI="${{ inputs.aws_acct_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com/${REPO_NAME}"

            BUILD_DIR="./service/${IMAGE_NAME}"
            if [ ! -f "$BUILD_DIR/Dockerfile" ]; then
              echo "⚠ No Dockerfile at $BUILD_DIR — skipping $IMAGE_NAME"
              continue
            fi

            echo "Building $IMAGE_NAME from $BUILD_DIR → $ECR_URI (${ARCH})"
            docker buildx build --platform "linux/${ARCH}" --push \
              -t "$ECR_URI:${{ github.sha }}" \
              -t "$ECR_URI:latest" \
              "$BUILD_DIR"
            echo "✓ Pushed $IMAGE_NAME:${{ github.sha }} and :latest"
          done

      # -----------------------------------------------------------------------
      # Pulumi: single run. Image exists by this point so update_agent_runtime
      # succeeds immediately. No second pass, no --refresh workaround needed.
      # -----------------------------------------------------------------------

      - name: Pulumi preview
        if: inputs.preview_only
        working-directory: engine
        env:
          PLATFORM_YAML_PATH: ${{ github.workspace }}/service/${{ inputs.platform_yaml_path }}
          AWS_REGION: ${{ inputs.aws_region }}
          PULUMI_BACKEND_URL: s3://${{ inputs.aws_acct_id }}-pulumi-backend-software
        run: |
          STACK_NAME="${{ inputs.stack }}.${{ steps.service_name.outputs.service_name }}.${{ inputs.aws_region }}"
          export PATH="$HOME/.local/bin:$HOME/.pulumi/bin:$PATH"
          uv run pulumi stack select "$STACK_NAME" -C devops
          uv run pulumi preview --non-interactive -C devops

      - name: Pulumi up
        if: ${{ !inputs.preview_only }}
        working-directory: engine
        env:
          PLATFORM_YAML_PATH: ${{ github.workspace }}/service/${{ inputs.platform_yaml_path }}
          AWS_REGION: ${{ inputs.aws_region }}
          PULUMI_BACKEND_URL: s3://${{ inputs.aws_acct_id }}-pulumi-backend-software
          DEPLOY_IMAGE_TAG: ${{ github.sha }}
        run: |
          STACK_NAME="${{ inputs.stack }}.${{ steps.service_name.outputs.service_name }}.${{ inputs.aws_region }}"
          export PATH="$HOME/.local/bin:$HOME/.pulumi/bin:$PATH"
          uv run pulumi stack select "$STACK_NAME" -C devops
          uv run pulumi up --yes --non-interactive -C devops

      - name: Get Pulumi outputs
        if: ${{ !inputs.preview_only }}
        id: pulumi_outputs
        working-directory: engine
        env:
          PULUMI_BACKEND_URL: s3://${{ inputs.aws_acct_id }}-pulumi-backend-software
        run: |
          STACK_NAME="${{ inputs.stack }}.${{ steps.service_name.outputs.service_name }}.${{ inputs.aws_region }}"
          export PATH="$HOME/.local/bin:$HOME/.pulumi/bin:$PATH"
          echo "Fetching Pulumi stack outputs for $STACK_NAME..."
          uv run pulumi stack select "$STACK_NAME" -C devops
          OUTPUTS_JSON=$(uv run pulumi stack output --json -C devops 2>&1)
          echo "Raw outputs: $OUTPUTS_JSON"

          ECR_URI=$(echo "$OUTPUTS_JSON" | jq -r '.ecr_repository_uri // empty')
          CLUSTER=$(echo "$OUTPUTS_JSON" | jq -r '.ecs_cluster_name // empty')
          SERVICE=$(echo "$OUTPUTS_JSON" | jq -r '.ecs_service_name // empty')

          HAS_ECS="false"
          if [ -n "$ECR_URI" ] && [ -n "$CLUSTER" ] && [ -n "$SERVICE" ]; then
            HAS_ECS="true"
          fi

          echo "ECR_URI=$ECR_URI"
          echo "CLUSTER=$CLUSTER"
          echo "SERVICE=$SERVICE"
          echo "HAS_ECS=$HAS_ECS"

          echo "ecr_uri=$ECR_URI" >> $GITHUB_OUTPUT
          echo "cluster=$CLUSTER" >> $GITHUB_OUTPUT
          echo "service=$SERVICE" >> $GITHUB_OUTPUT
          echo "has_ecs=$HAS_ECS" >> $GITHUB_OUTPUT
          echo "outputs_json<<OUTPUTS_EOF" >> $GITHUB_OUTPUT
          echo "$OUTPUTS_JSON" >> $GITHUB_OUTPUT
          echo "OUTPUTS_EOF" >> $GITHUB_OUTPUT

      - name: Login to Amazon ECR (ECS post-Pulumi)
        if: ${{ !inputs.preview_only && steps.pulumi_outputs.outputs.has_ecs == 'true' }}
        run: |
          aws ecr get-login-password --region ${{ inputs.aws_region }} | \
            docker login --username AWS --password-stdin \
            ${{ inputs.aws_acct_id }}.dkr.ecr.${{ inputs.aws_region }}.amazonaws.com

      - name: Build and push Docker image
        if: ${{ !inputs.preview_only && steps.pulumi_outputs.outputs.has_ecs == 'true' }}
        run: |
          ECR_URI="${{ steps.pulumi_outputs.outputs.ecr_uri }}"
          echo "Building and pushing Docker image to $ECR_URI"
          docker build -t "$ECR_URI:${{ github.sha }}" -t "$ECR_URI:latest" ./service
          docker push "$ECR_URI:${{ github.sha }}"
          docker push "$ECR_URI:latest"

      - name: Force ECS service deployment
        if: ${{ !inputs.preview_only && steps.pulumi_outputs.outputs.has_ecs == 'true' }}
        run: |
          aws ecs update-service \
            --cluster "${{ steps.pulumi_outputs.outputs.cluster }}" \
            --service "${{ steps.pulumi_outputs.outputs.service }}" \
            --force-new-deployment \
            --region ${{ inputs.aws_region }}

      - name: Output service URL
        if: ${{ !inputs.preview_only && steps.pulumi_outputs.outputs.has_ecs == 'true' }}
        run: |
          echo "Service URL: https://${{ steps.service_name.outputs.service_name }}.althq-dev.com"

      - name: Output provisioned resources
        if: ${{ !inputs.preview_only }}
        working-directory: engine
        env:
          PULUMI_BACKEND_URL: s3://${{ inputs.aws_acct_id }}-pulumi-backend-software
        run: |
          STACK_NAME="${{ inputs.stack }}.${{ steps.service_name.outputs.service_name }}.${{ inputs.aws_region }}"
          export PATH="$HOME/.local/bin:$HOME/.pulumi/bin:$PATH"
          uv run pulumi stack select "$STACK_NAME" -C devops
          echo "Provisioned resources:"
          OUTPUTS=$(uv run pulumi stack output --json -C devops)
          echo "$OUTPUTS"
          ARN=$(echo "$OUTPUTS" | jq -r '.agentcore_runtime_claude_agent_arn // empty')
          if [ -n "$ARN" ]; then
            echo "::notice title=AgentCore runtime ARN::Use with chat-deployed: AGENTCORE_RUNTIME_ARN=$ARN"
            echo "AgentCore runtime ARN (stable across deploys): $ARN"
          fi
